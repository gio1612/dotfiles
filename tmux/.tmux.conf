# .tmux.conf — modernized tmux config

# ── Prefix ────────────────────────────────────────────────────────────────────
# Change prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0       # No delay for escape key (important for nvim)
set -g focus-events on
set -g base-index 1         # Start windows at 1
setw -g pane-base-index 1   # Start panes at 1
set -g renumber-windows on  # Renumber after close

# ── Key bindings ──────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with | and - (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g status-left "#[bold]  #S #[nobold]"
set -g status-left-length 20
set -g status-right "#[fg=#a89984]%H:%M  %d %b "
set -g status-right-length 40

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#504945,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#fe8019"

# ── TPM (Tmux Plugin Manager) ─────────────────────────────────────────────────
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Persist sessions across restarts
set -g @plugin 'tmux-plugins/tmux-continuum'   # Auto-save sessions
set -g @plugin 'christoomey/vim-tmux-navigator' # Seamless vim/tmux pane switching

set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
