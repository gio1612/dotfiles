# .tmux.conf — modernized tmux config

# ── Prefix ────────────────────────────────────────────────────────────────────
# Change prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"
set -as terminal-overrides ",*:Smulx=\E[4::%p1%dm"   # undercurl support
set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"  # undercurl colors

set -g history-limit 50000
set -g mouse on
set -sg escape-time 0         # No delay for escape key (important for nvim)
set -g focus-events on
set -g set-clipboard on       # OSC 52 clipboard (works over WSL2 / SSH)
set -g aggressive-resize on   # Resize to smallest *active* client
set -g display-time 3000      # Show messages for 3 seconds
set -g display-panes-time 2000
set -g allow-passthrough on

# ── Windows & panes ───────────────────────────────────────────────────────────
set -g base-index 1           # Start windows at 1
setw -g pane-base-index 1     # Start panes at 1
set -g renumber-windows on    # Renumber after close
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"
setw -g monitor-activity on   # Highlight windows with new activity

# ── Key bindings ──────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with | and - (intuitive), keep current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Repeatable pane resize (hold key to keep resizing)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alt+number: instant window switch (no prefix required)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Toggle last window
bind Space last-window

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Kill pane without confirmation prompt
bind x kill-pane

# ── Copy mode (vi-style) ─────────────────────────────────────────────────────
setw -g mode-keys vi

bind v copy-mode

bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# Mouse selection copies to clipboard (via OSC 52)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Incremental search in scrollback
bind -T copy-mode-vi / command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""

# ── Status bar (Gruvbox dark hard) ───────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1d2021,fg=#ebdbb2"

# Left: session name badge
set -g status-left-length 30
set -g status-left "#[bg=#fe8019,fg=#1d2021,bold]  #S #[bg=#1d2021,fg=#fe8019]"

# Right: context (dir or command), time, date
set -g status-right-length 60
set -g status-right "#[fg=#928374] #{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}} #[fg=#504945]|#[fg=#a89984] %H:%M #[fg=#504945]|#[fg=#a89984] %d %b "

# Window tabs
set -g window-status-format "#[fg=#928374] #I #W "
set -g window-status-current-format "#[bg=#504945,fg=#fe8019,bold] #I #W "
set -g window-status-separator ""
set -g window-status-activity-style "fg=#fabd2f"  # Gruvbox yellow for activity

# Messages
set -g message-style "bg=#fe8019,fg=#1d2021,bold"
set -g message-command-style "bg=#504945,fg=#ebdbb2"

# Pane borders
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fe8019"
set -g pane-border-lines heavy

# Copy mode highlight
setw -g mode-style "bg=#fe8019,fg=#1d2021"

# ── TPM (Tmux Plugin Manager) ─────────────────────────────────────────────────
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Persist sessions across restarts
set -g @plugin 'tmux-plugins/tmux-continuum'   # Auto-save sessions
set -g @plugin 'christoomey/vim-tmux-navigator' # Seamless vim/tmux pane switching
set -g @plugin 'tmux-plugins/tmux-yank'         # Clipboard (fallback for SSH/edge cases)

# ── Plugin configuration ──────────────────────────────────────────────────────
# Resurrect: save/restore Neovim sessions and pane contents
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Continuum: auto-save every 10 minutes, restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Yank: OSC 52 (no external tool needed in WSL2)
set -g @yank_with_mouse on
set -g @override_copy_command ''

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
